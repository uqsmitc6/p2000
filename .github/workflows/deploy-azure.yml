# Deploy p2001 (UQ Slide Converter) to Azure App Service
# Triggers on push to main branch
# Builds Docker image → pushes to Azure Container Registry → deploys to Web App

name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:  # Allows manual trigger from GitHub Actions tab

env:
  ACR_NAME: bschoollearningtools
  ACR_LOGIN_SERVER: bschoollearningtools.azurecr.io
  APP_NAME: p2001
  RESOURCE_GROUP: bschool-learning-tools
  IMAGE_NAME: p2001

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Log in to Azure Container Registry
      - name: Log in to ACR
        uses: azure/docker-login@v2
        with:
          login-server: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # 3. Build and push Docker image
      - name: Build and push Docker image
        run: |
          docker build -t ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
                       -t ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest .
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

      # 4. Log in to Azure
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 5. Deploy to Azure Web App
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.APP_NAME }}
          images: ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      # 6. Log out of Azure
      - name: Azure logout
        run: az logout
        if: always()
